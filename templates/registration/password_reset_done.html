{% extends 'base.html' %}

{% block title %}E-mail enviado | OnMenu{% endblock %}

{% block content %}
<div class="page-content auth-page">
  <div class="auth-card checkout-card">
    <div class="checkout-card-head">
      <span class="checkout-card-icon ico-green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </span>
      Verifique seu e-mail
    </div>

    <p class="auth-sub">
      Se houver uma conta com o e-mail informado, enviamos um link para você
      redefinir sua senha. Confira também a caixa de spam.
    </p>

    <p class="auth-alt">
      <a href="{% url 'accounts:login' %}">Voltar para o login</a>
    </p>
  </div>
</div>
{% endblock %}
