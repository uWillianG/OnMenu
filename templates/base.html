{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OnMenu{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'menu:menu_list' %}">OnMenu</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{% url 'menu:menu_list' %}">Menu</a>
      <a href="{% url 'cart:cart_detail' %}">Cart <span class="nav-count">{{ cart_item_count }}</span></a>
      {% if request.user.is_staff %}
        <a href="{% url 'orders:staff_order_list' %}">Staff</a>
      {% endif %}
    </nav>
  </header>

  {% if messages %}
    <div class="messages" aria-live="polite">
      {% for message in messages %}
        <div class="message message-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
