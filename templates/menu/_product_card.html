{% load static %}
<article class="product-card{% if not item.is_available %} unavailable{% endif %}"
         {% if item.is_available %}data-open-modal="{{ item.pk }}" tabindex="0" role="button" aria-label="Ver {{ item.name }}"{% endif %}>
  <div class="product-info">
    <div class="product-name">{{ item.name }}</div>
    {% if item.description %}
      <div class="product-desc">{{ item.description }}</div>
    {% endif %}
    <div class="product-footer">
      <span class="product-price">{{ currency_symbol }} {{ item.price|floatformat:2 }}</span>
      {% if item.is_available %}
        <span class="card-add-icon" aria-hidden="true">+</span>
      {% else %}
        <span class="unavail-badge">Indisponível</span>
      {% endif %}
    </div>
  </div>
  <div class="product-thumb" aria-hidden="true">
    {% if item.image %}
      <img src="{{ item.image.url }}" alt="">
    {% elif item.image_url %}
      <img src="{{ item.image_url }}" alt="">
    {% else %}
      <img src="{% static 'img/placeholder-food.svg' %}" alt="">
    {% endif %}
  </div>
</article>
